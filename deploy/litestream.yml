# Litestream config for continuous SQLite backup.
#
# Used by the optional `litestream` sidecar in deploy/docker-compose.yml.
# Replicates /data/db.sqlite to S3-compatible object storage in
# near-realtime. RPO: a few seconds. RTO: minutes (point Litestream
# at the backup bucket on a fresh deploy, it pulls down the WAL +
# snapshot and reconstructs the DB).
#
# Works with any S3-compatible service:
#   • AWS S3                  endpoint omitted; just set region.
#   • Cloudflare R2           endpoint = https://<acct-id>.r2.cloudflarestorage.com
#   • Backblaze B2            endpoint = https://s3.<region>.backblazeb2.com
#   • MinIO / self-hosted     endpoint = https://your-minio.example.com
#
# Secrets (LITESTREAM_ACCESS_KEY_ID / LITESTREAM_SECRET_ACCESS_KEY)
# come from the docker-compose env via the sidecar's environment block.

dbs:
  - path: /data/db.sqlite
    replicas:
      - type: s3
        bucket: keywordista-backups   # ← your bucket name
        path: keywordista             # ← path prefix inside the bucket
        region: auto
        # endpoint: https://<acct-id>.r2.cloudflarestorage.com  # for R2 / B2 / MinIO
        # Retention: keep snapshots for 7 days. Bump for longer
        # disaster-recovery windows; storage is cheap.
        retention: 168h
        retention-check-interval: 1h
        snapshot-interval: 1h
        sync-interval: 1s
