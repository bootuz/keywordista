# Example Kubernetes Secret for Keywordista. **DO NOT commit a filled-in
# copy of this file to git.** It's here as a template for `kubectl create
# secret` or for sealed-secrets / sops / external-secrets workflows.
#
# Quick-start (plain Secret, plaintext only in the kubectl invocation):
#
#   kubectl create secret generic keywordista-secrets \
#     --from-literal=encryption-key=$(openssl rand -hex 32) \
#     --from-literal=public-base-url=https://kw.your-domain.com
#
# That's the minimum to boot. Add admin-email / admin-password-hash /
# database-url as additional --from-literal flags to enable those features.

apiVersion: v1
kind: Secret
metadata:
  name: keywordista-secrets
  labels:
    app.kubernetes.io/name: keywordista
type: Opaque
stringData:
  # 64 hex chars (32 bytes). Generate ONCE and never lose:
  #   openssl rand -hex 32
  encryption-key: REPLACE_ME_64_HEX_CHARS

  # Public URL the team will access at (no trailing slash):
  public-base-url: https://keywordista.your-domain.com

  # Optional: pre-baked admin (omit both to use in-browser setup wizard):
  # admin-email: you@studio.com
  # admin-password-hash: $2b$12$REPLACE_ME_WITH_BCRYPT_OUTPUT

  # Optional: flip to Postgres:
  # database-url: postgres://keywordista:CHANGEME@postgres.default.svc:5432/keywordista
