# Keywordista Deployment for a Kubernetes cluster.
#
# Plan §4.6.7: anyone with a K8s cluster can run Keywordista just by
# pointing at our image and supplying env vars. No custom operator,
# no Helm chart (those would be welcome community contributions —
# see docs/deploy/community.md).
#
# Apply order:
#   kubectl apply -f deploy/kubernetes/pvc.yaml
#   kubectl apply -f deploy/kubernetes/secret.example.yaml  (edit FIRST)
#   kubectl apply -f deploy/kubernetes/deployment.yaml
#   kubectl apply -f deploy/kubernetes/service.yaml
#   kubectl apply -f deploy/kubernetes/ingress.yaml         (optional)
#
# Why replicas: 1 and a Recreate strategy: SQLite (the default DB) is
# a single-writer store, and the iTunes API throttling makes two
# replicas counterproductive even with Postgres. Documented in
# §4.10 of the deploy plan. If you want HA, use Postgres + an external
# DB instance + a leader-election sidecar (out of scope for v1).

apiVersion: apps/v1
kind: Deployment
metadata:
  name: keywordista
  labels:
    app.kubernetes.io/name: keywordista
    app.kubernetes.io/component: server
spec:
  replicas: 1
  strategy:
    # Recreate (not RollingUpdate): the old pod releases the volume
    # before the new pod claims it. RollingUpdate would deadlock on
    # ReadWriteOnce volumes.
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: keywordista
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keywordista
        app.kubernetes.io/component: server
    spec:
      # Non-root, fsGroup matches the keywordista user (uid 10001) so
      # the mounted volume is writable.
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        runAsNonRoot: true
      containers:
        - name: keywordista
          # Pin by digest in production (cockpit always does); :latest
          # here is the manual-deploy convenience case.
          image: ghcr.io/bootuz/keywordista:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: KEYWORDISTA_MODE
              value: server
            - name: KEYWORDISTA_DATA_DIR
              value: /data
            # Secrets from the Kubernetes Secret (see secret.example.yaml).
            - name: KEYWORDISTA_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: keywordista-secrets
                  key: encryption-key
            - name: KEYWORDISTA_PUBLIC_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: keywordista-secrets
                  key: public-base-url
            # Optional pre-baked admin (omit to use in-browser setup wizard):
            - name: KEYWORDISTA_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: keywordista-secrets
                  key: admin-email
                  optional: true
            - name: KEYWORDISTA_ADMIN_PASSWORD_HASH
              valueFrom:
                secretKeyRef:
                  name: keywordista-secrets
                  key: admin-password-hash
                  optional: true
            # Optional: flip to Postgres
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: keywordista-secrets
                  key: database-url
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /data
          # K8s-native probes. Image also has its own HEALTHCHECK —
          # both fire and that's fine.
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          # Reasonable defaults for a small-team deploy. Bump for
          # heavier workloads (many tracked apps, many keywords).
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: keywordista-data
