# Reference docker-compose for a Keywordista server deployment.
#
# The canonical "no-cockpit" path from plan §4.6.7: works on any host
# with Docker + docker compose, including a $4/mo VPS at Hetzner, a
# spare M-series Mac at home, a homelab Proxmox VM, or a developer
# laptop for testing.
#
# Three optional services beyond the core `keywordista` web app:
#   • postgres   — managed Postgres if you'd rather not use SQLite
#   • caddy      — reverse proxy with auto-TLS for custom domains
#   • litestream — continuous SQLite backup to S3/R2/B2
#
# All three are commented out by default. The minimum-viable deploy is
# just the `keywordista` service + the `keywordista-data` volume.
#
# Quick start:
#   1. Copy this file + the .env.example next to it (see deploy/.env.example)
#      to your server.
#   2. Edit .env: set KEYWORDISTA_ENCRYPTION_KEY (openssl rand -hex 32) and
#      KEYWORDISTA_PUBLIC_BASE_URL (the URL you'll serve from).
#   3. `docker compose up -d`
#   4. Visit your URL → setup wizard guides you through admin creation.
#
# The cockpit's Custom-Docker-Host deploy flow (M5) generates THIS file
# verbatim, fills in .env, and walks the operator through scp + ssh + up.

services:

  keywordista:
    # Pinned by tag — for production prefer pinning by @sha256:<digest>
    # (cosign-verified, immutable). The cockpit always pins by digest;
    # this YAML uses :latest for the manual-deploy convenience case.
    # Override with KEYWORDISTA_IMAGE=ghcr.io/<owner>/keywordista@sha256:…
    # in .env when you want immutable production pins.
    image: ${KEYWORDISTA_IMAGE:-ghcr.io/bootuz/keywordista:latest}
    container_name: keywordista
    restart: unless-stopped

    # Required env (operator must set in .env):
    #   KEYWORDISTA_ENCRYPTION_KEY    — 64 hex chars (32 bytes). Generate
    #                                    once with `openssl rand -hex 32`.
    #                                    Same key forever — losing it means
    #                                    losing access to stored secrets.
    #   KEYWORDISTA_PUBLIC_BASE_URL   — https://kw.your-domain.com (used
    #                                    to render invite links).
    #
    # Optional admin bootstrap (skip these to use the in-browser setup
    # wizard instead):
    #   KEYWORDISTA_ADMIN_EMAIL       — admin email for first user
    #   KEYWORDISTA_ADMIN_PASSWORD_HASH — bcrypt hash; NEVER plaintext.
    #     Generate locally: `htpasswd -nB -C 12 yourname | cut -d: -f2`
    #
    # Optional database (defaults to SQLite at /data/db.sqlite):
    #   DATABASE_URL=postgres://...   — flip to Postgres
    environment:
      KEYWORDISTA_MODE: server
      KEYWORDISTA_ENCRYPTION_KEY: ${KEYWORDISTA_ENCRYPTION_KEY:?required — run: openssl rand -hex 32}
      KEYWORDISTA_PUBLIC_BASE_URL: ${KEYWORDISTA_PUBLIC_BASE_URL:?required — your public URL}
      KEYWORDISTA_ADMIN_EMAIL: ${KEYWORDISTA_ADMIN_EMAIL:-}
      KEYWORDISTA_ADMIN_PASSWORD_HASH: ${KEYWORDISTA_ADMIN_PASSWORD_HASH:-}
      KEYWORDISTA_LOG_LEVEL: ${KEYWORDISTA_LOG_LEVEL:-info}
      DATABASE_URL: ${DATABASE_URL:-}
      # Inside the docker network, postgres reaches us as `postgres:5432`.
      # If you uncomment the postgres service below AND don't set
      # DATABASE_URL above, this is the URL keywordista will use.
      # (postgres:5432 resolves to nothing if the postgres service is
      # commented out; that's intentional — silence beats a confusing
      # connection error.)

    ports:
      # 8080 → host port 8080. Behind a reverse proxy (caddy below), you
      # can bind to 127.0.0.1:8080 instead so only the proxy can reach it.
      - "8080:8080"

    volumes:
      # SQLite + any future user-uploaded files live here. The Postgres
      # path doesn't use this volume.
      - keywordista-data:/data

    healthcheck:
      # Compose's health check is independent of the image's own
      # HEALTHCHECK (defined in the Dockerfile). Defining it here too
      # makes `docker compose ps` show the green status.
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

    # depends_on: [postgres]  # Uncomment when using postgres below.

  # ── Optional: Postgres ──────────────────────────────────────────
  #
  # Uncomment to use Postgres instead of SQLite. Also set
  # `DATABASE_URL: postgres://keywordista:${POSTGRES_PASSWORD}@postgres:5432/keywordista`
  # in the keywordista service's `environment` block above.
  #
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: keywordista-postgres
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: keywordista
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required when postgres is enabled}
  #     POSTGRES_DB: keywordista
  #   volumes:
  #     - keywordista-postgres-data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U keywordista"]
  #     interval: 10s

  # ── Optional: Caddy reverse proxy with auto-TLS ─────────────────
  #
  # Uncomment for automatic Let's Encrypt certificates on a custom
  # domain. Point your DNS A record at this host's public IP, then
  # set CADDY_DOMAIN in .env. Caddy handles cert renewal forever.
  #
  # caddy:
  #   image: caddy:2-alpine
  #   container_name: keywordista-caddy
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   environment:
  #     CADDY_DOMAIN: ${CADDY_DOMAIN:?required when caddy is enabled}
  #   volumes:
  #     - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
  #     - keywordista-caddy-data:/data
  #     - keywordista-caddy-config:/config
  #   depends_on:
  #     - keywordista

  # ── Optional: Litestream (continuous SQLite backup) ─────────────
  #
  # Uncomment to replicate the SQLite WAL to S3/R2/B2 in near-realtime.
  # Recovery RPO: a few seconds. Recovery RTO: minutes (point Litestream
  # at the backup bucket, it pulls down a fresh DB).
  #
  # litestream:
  #   image: litestream/litestream:0.3
  #   container_name: keywordista-litestream
  #   restart: unless-stopped
  #   command: replicate
  #   environment:
  #     LITESTREAM_ACCESS_KEY_ID: ${LITESTREAM_ACCESS_KEY_ID:?required}
  #     LITESTREAM_SECRET_ACCESS_KEY: ${LITESTREAM_SECRET_ACCESS_KEY:?required}
  #   volumes:
  #     - keywordista-data:/data
  #     - ./litestream.yml:/etc/litestream.yml:ro
  #   depends_on:
  #     - keywordista

volumes:
  keywordista-data:
  # keywordista-postgres-data:
  # keywordista-caddy-data:
  # keywordista-caddy-config:
