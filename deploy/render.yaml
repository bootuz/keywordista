# Render.com Blueprint for Keywordista.
#
# Deploy in one click from this repo:
#   1. Fork github.com/<owner>/keywordista
#   2. dashboard.render.com → New → Blueprint → connect your fork
#   3. Render reads this file, provisions a web service + a 1 GB disk
#   4. After creation, set the two `sync: false` env vars below
#      (Render shows them as "needs value" in the dashboard).
#   5. Visit your new keywordista-*.onrender.com URL → setup wizard.
#
# The cockpit's Render provider (M3) creates the equivalent service
# via Render's REST API directly, but produces the same shape as this
# Blueprint — operators who'd rather click can use this file instead.
#
# Pricing: Starter web service ($7/mo) + 1 GB persistent disk ($0.25/mo)
# = ~$7.25/mo. Postgres (optional, commented at bottom) adds ~$7/mo.

services:
  - type: web
    name: keywordista
    runtime: image
    plan: starter

    image:
      # Cosign-verifiable image published by .github/workflows/release-image.yml.
      # Render auto-pulls on every restart; we don't need to manage pulls.
      url: ghcr.io/bootuz/keywordista:latest

    # Render injects PORT (default 10000) — image reads it from env. The
    # binary binds 0.0.0.0:$PORT because KEYWORDISTA_MODE=server flips
    # the hostname default (see EnvVarManifest §4.6.3).
    healthCheckPath: /health

    # One instance per deployment, by design. SQLite + iTunes API
    # throttling both make horizontal scaling the wrong answer here;
    # the §4.10 abstraction documents this constraint formally.
    numInstances: 1

    disk:
      name: keywordista-data
      mountPath: /data
      sizeGB: 1   # SQLite + a few MB of metadata; bump to 10 for many users.

    envVars:
      # Pre-set on this Blueprint; safe to commit (no secrets here).
      - key: KEYWORDISTA_MODE
        value: server
      - key: KEYWORDISTA_DATA_DIR
        value: /data

      # SECRETS — the Render dashboard will prompt the operator for
      # these the first time. `sync: false` keeps them out of the
      # Blueprint file (i.e. out of git).
      - key: KEYWORDISTA_ENCRYPTION_KEY
        sync: false   # Generate ONCE: openssl rand -hex 32
      - key: KEYWORDISTA_PUBLIC_BASE_URL
        sync: false   # https://keywordista-*.onrender.com (Render shows yours)

      # Optional bootstrap. Leave unset to use the in-browser setup wizard.
      - key: KEYWORDISTA_ADMIN_EMAIL
        sync: false
      - key: KEYWORDISTA_ADMIN_PASSWORD_HASH
        sync: false

      # Optional: flip to Postgres. Uncomment the database block below
      # AND set DATABASE_URL via Render's "Connect to database" UI (it
      # auto-fills the internal connection string).
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: keywordista-postgres
      #     property: connectionString

# ── Optional: Render-managed Postgres ────────────────────────────────
#
# Uncomment to provision Postgres alongside the web service. Render
# auto-injects DATABASE_URL into the web service env (see fromDatabase
# above). Cheapest plan: $7/mo Starter (1 GB storage, 0.1 vCPU).
#
# databases:
#   - name: keywordista-postgres
#     plan: starter
#     databaseName: keywordista
#     user: keywordista
