name: Release Image

# Builds and publishes the server Docker image to GHCR when an `image-v*`
# tag is pushed. Joins release-app.yml (`app-v*` → DMG) and
# release-service.yml (`service-v*` → menubar service .zip) as the third
# tag stream — they're versioned independently because the image
# (server-side) and the macOS bundle (client-side) evolve on different
# cadences and target different audiences.
#
# Tagging convention:
#   git tag image-v1.2.3   → pushes to ghcr.io/<owner>/keywordista:
#                              :1.2.3   (exact SemVer)
#                              :1.2     (major.minor — gets bumped patches)
#                              :1       (major — gets bumped minors)
#                              :latest  (always the newest stable)
#                              @sha256:<digest>  (immutable, cockpit pins this)
#
# Architecture: linux/amd64 + linux/arm64. **Native parallel builds**:
# amd64 on ubuntu-latest, arm64 on ubuntu-24.04-arm (free public-repo
# native ARM runners, released by GitHub in 2024). Before this M3.15
# refactor, the arm64 variant was QEMU-emulated on the amd64 runner,
# making first-time builds ~30-45 min; native builds drop that to
# ~8-12 min and cached subsequent builds to ~3-5 min.
#
# Workflow shape:
#   build  (matrix: amd64 + arm64) → pushes per-arch digests
#   manifest                       → combines digests into multi-arch
#                                    manifest, cosign-signs the result,
#                                    attaches SLSA-3 provenance
#
# Supply chain (unchanged from M0.8):
#   • cosign --keyless: signs the resulting manifest using the
#     workflow's GitHub OIDC identity. Verifiable later with
#     `cosign verify ghcr.io/.../keywordista:<tag>
#        --certificate-identity-regexp 'https://github.com/bootuz/keywordista'
#        --certificate-oidc-issuer 'https://token.actions.githubusercontent.com'`.
#   • actions/attest-build-provenance: emits SLSA-3 provenance
#     attached to the registry image. Tells anyone pulling it
#     "this image was built by THIS workflow run from THIS commit."
#
# Manual trigger (workflow_dispatch) for dry runs: builds and pushes
# to a transient `:dryrun-<sha>` tag without touching :latest etc.

on:
  push:
    tags:
      - 'image-v*'
  # Dry-run trigger: builds + pushes to a `dryrun-<sha>` tag without
  # touching :latest etc. Useful for validating the workflow itself
  # without minting a real release.
  workflow_dispatch:

# Don't cancel in-flight releases — a half-pushed multi-arch manifest
# leaves the registry in a confusing state. Different tag versions can
# run concurrently; we serialize only within the same image-stream group.
concurrency:
  group: release-image
  cancel-in-progress: false

permissions:
  # Pull the repo.
  contents: read
  # Push to ghcr.io/<owner>/keywordista.
  packages: write
  # Cosign keyless signing + SLSA provenance both need an OIDC token.
  id-token: write
  # SLSA provenance attestation.
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/keywordista

jobs:
  # ── Stage 1: per-arch builds in parallel on native runners ──────────
  #
  # Each runs `docker buildx build` for ONE platform with
  # `outputs: type=image,push-by-digest=true,name-canonical=true,push=true`
  # — that pushes the per-arch image to the registry under the
  # repository's digest WITHOUT applying any tags. We then save the
  # digest as a file artifact so the manifest job can find them all.
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            # Free native ARM64 runner for public repos, released by
            # GitHub in 2024. No QEMU emulation; Swift release builds
            # in ~10 min instead of ~40.
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Prepare platform pair
        # We need the platform as a slash-free string for the artifact
        # name ("linux-amd64", not "linux/amd64").
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Same labels as M0.8's metadata step, but without per-platform
      # tags (the manifest job applies those after combining digests).
      - name: Extract labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.title=Keywordista
            org.opencontainers.image.description=Self-hosted App Store keyword tracker for indie iOS devs
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Compute build args
        id: buildargs
        run: |
          set -euo pipefail
          if [[ "${{ github.ref_type }}" == "tag" && "${{ github.ref_name }}" == image-v* ]]; then
            VERSION="${GITHUB_REF_NAME#image-v}"
          else
            VERSION="dryrun-${GITHUB_SHA::7}"
          fi
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          {
            echo "version=$VERSION"
            echo "commit_sha=${GITHUB_SHA::7}"
            echo "build_date=$BUILD_DATE"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            KEYWORDISTA_BUILD_VERSION=${{ steps.buildargs.outputs.version }}
            KEYWORDISTA_BUILD_COMMIT_SHA=${{ steps.buildargs.outputs.commit_sha }}
            KEYWORDISTA_BUILD_DATE=${{ steps.buildargs.outputs.build_date }}
          # push-by-digest=true means "push the per-arch image to the
          # registry but DON'T tag it" — the manifest job creates the
          # tagged multi-arch manifest pointing at these digests.
          outputs: |
            type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          # Per-arch GHA cache scopes — amd64 + arm64 don't share
          # layers, so separate scopes prevent contention. Cache
          # writes from the previous arch's build don't help this one.
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}

      # Save the digest as a file so the manifest job can read it.
      # Artifact name is per-arch so they don't clobber each other.
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── Stage 2: combine per-arch digests into the tagged manifest ──────
  #
  # `docker buildx imagetools create -t <full-tag> <reg>@<digest1> <reg>@<digest2>`
  # creates the multi-arch manifest list. Cosign signs the resulting
  # manifest digest; SLSA-3 attestation attaches to it.
  manifest:
    name: Combine, sign, attest
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Same tag-derivation rules as before, but now applied to the
      # combined manifest rather than to each per-arch build.
      - name: Compute manifest tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=match,pattern=image-v(.*),group=1
            type=match,pattern=image-v(\d+\.\d+)\..*,group=1
            type=match,pattern=image-v(\d+)\..*,group=1
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/image-v') }}
            type=raw,value=dryrun-${{ github.sha }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        run: |
          set -euo pipefail
          # `printf` builds the per-tag -t flags; xargs feeds the
          # digest list at the end. The digest filenames are the
          # sha256 part (we touched files named "abc123..." in build).
          tag_args=$(printf -- '-t %s ' $(echo '${{ steps.meta.outputs.tags }}'))
          digest_args=$(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)
          docker buildx imagetools create $tag_args $digest_args

      - name: Resolve combined manifest digest
        id: digest
        run: |
          set -euo pipefail
          # Use one of the published tags to look up the manifest list
          # digest — they all point at the same multi-arch index.
          # `steps.meta.outputs.tags` is a NEWLINE-separated list (one
          # ref per line); we grab the first line. Previously this used
          # `awk '{print $1}'` which prints the first field of EACH line,
          # producing a multi-line string that `imagetools inspect`
          # rejected as "invalid reference format." Caught in the M3.15
          # first run.
          first_tag=$(echo '${{ steps.meta.outputs.tags }}' | head -n1)
          digest=$(docker buildx imagetools inspect "$first_tag" --format '{{json .Manifest}}' | jq -r .digest)
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "→ Combined manifest digest: $digest"

      # ── Cosign + SLSA (unchanged from M0.8) ────────────────────────
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Sign each published tag at the manifest digest
        env:
          DIGEST: ${{ steps.digest.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          for tag in $TAGS; do
            echo "→ Signing $tag (@$DIGEST)"
            cosign sign --yes "${tag}@${DIGEST}"
          done

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true

      - name: Summary
        env:
          DIGEST: ${{ steps.digest.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          {
            echo "## ✓ Multi-arch image published"
            echo ""
            echo "**Combined manifest digest:** \`$DIGEST\`"
            echo ""
            echo "**Architectures:** linux/amd64, linux/arm64 (both native, no QEMU)"
            echo ""
            echo "**Tags:**"
            for tag in $TAGS; do
              echo "- \`$tag\`"
            done
            echo ""
            echo "**Pull:**"
            echo "\`\`\`"
            echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@$DIGEST"
            echo "\`\`\`"
            echo ""
            echo "**Verify signature:**"
            echo "\`\`\`"
            echo "cosign verify ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@$DIGEST \\"
            echo "  --certificate-identity-regexp 'https://github.com/${{ github.repository }}' \\"
            echo "  --certificate-oidc-issuer 'https://token.actions.githubusercontent.com'"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
