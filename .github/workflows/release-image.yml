name: Release Image

# Builds and publishes the server Docker image to GHCR when an `image-v*`
# tag is pushed. Joins release-app.yml (`app-v*` → DMG) and
# release-service.yml (`service-v*` → menubar service .zip) as the third
# tag stream — they're versioned independently because the image
# (server-side) and the macOS bundle (client-side) evolve on different
# cadences and target different audiences.
#
# Tagging convention:
#   git tag image-v1.2.3   → pushes to ghcr.io/<owner>/keywordista:
#                              :1.2.3   (exact SemVer)
#                              :1.2     (major.minor — gets bumped patches)
#                              :1       (major — gets bumped minors)
#                              :latest  (always the newest stable)
#                              @sha256:<digest>  (immutable, cockpit pins this)
#
# Architecture: linux/amd64 + linux/arm64. Native amd64 build on
# ubuntu-latest, arm64 cross-built via QEMU emulation (slow but
# reliable; matches what most projects ship).
#
# Supply chain:
#   • cosign --keyless: signs the resulting manifest using the
#     workflow's GitHub OIDC identity. Verifiable later with
#     `cosign verify ghcr.io/.../keywordista:<tag>
#        --certificate-identity-regexp 'https://github.com/bootuz/keywordista'
#        --certificate-oidc-issuer 'https://token.actions.githubusercontent.com'`.
#   • actions/attest-build-provenance: emits SLSA-3 provenance
#     attached to the registry image. Tells anyone pulling it
#     "this image was built by THIS workflow run from THIS commit."
#
# Manual trigger (workflow_dispatch) for dry runs: builds and pushes
# to a transient `:dryrun-<sha>` tag without touching :latest etc.

on:
  push:
    tags:
      - 'image-v*'
  # Dry-run trigger: builds + pushes to a `dryrun-<sha>` tag without
  # touching :latest etc. Useful for validating the workflow itself
  # without minting a real release.
  workflow_dispatch:

# Don't cancel in-flight releases — a half-pushed multi-arch manifest
# leaves the registry in a confusing state. Different tag versions can
# run concurrently; we serialize only within the same image-stream group.
concurrency:
  group: release-image
  cancel-in-progress: false

permissions:
  # Pull the repo.
  contents: read
  # Push to ghcr.io/<owner>/keywordista.
  packages: write
  # Cosign keyless signing + SLSA provenance both need an OIDC token.
  id-token: write
  # SLSA provenance attestation.
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/keywordista

jobs:
  build-push-sign:
    name: Build, push, sign, attest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # QEMU lets the amd64 runner build the arm64 variant. Slow (~3-5×
      # native), but it's the standard pattern and runs in CI minutes
      # we'd otherwise pay for an arm64 self-hosted runner.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          # The workflow's built-in token has packages:write because of
          # the permissions block above; no PAT needed.
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derives every tag form (:semver, :major.minor, :major, :latest)
      # from the pushed git tag. Strips the leading 'image-v' so
      # 'image-v1.2.3' becomes the docker tag '1.2.3'.
      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=match,pattern=image-v(.*),group=1
            type=match,pattern=image-v(\d+\.\d+)\..*,group=1
            type=match,pattern=image-v(\d+)\..*,group=1
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/image-v') }}
            type=raw,value=dryrun-${{ github.sha }},enable=${{ github.event_name == 'workflow_dispatch' }}
          labels: |
            org.opencontainers.image.title=Keywordista
            org.opencontainers.image.description=Self-hosted App Store keyword tracker for indie iOS devs
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      # Compute the build args ImageMetadata.swift reads at runtime.
      # KEYWORDISTA_BUILD_VERSION = the SemVer extracted from the tag
      # ('image-v1.2.3' → '1.2.3'); empty for dry runs.
      - name: Compute build args
        id: buildargs
        run: |
          set -euo pipefail
          if [[ "${{ github.ref_type }}" == "tag" && "${{ github.ref_name }}" == image-v* ]]; then
            VERSION="${GITHUB_REF_NAME#image-v}"
          else
            VERSION="dryrun-${GITHUB_SHA::7}"
          fi
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          {
            echo "version=$VERSION"
            echo "commit_sha=${GITHUB_SHA::7}"
            echo "build_date=$BUILD_DATE"
          } >> "$GITHUB_OUTPUT"
          echo "→ Building keywordista $VERSION (${GITHUB_SHA::7}) at $BUILD_DATE"

      - name: Build and push (multi-arch)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            KEYWORDISTA_BUILD_VERSION=${{ steps.buildargs.outputs.version }}
            KEYWORDISTA_BUILD_COMMIT_SHA=${{ steps.buildargs.outputs.commit_sha }}
            KEYWORDISTA_BUILD_DATE=${{ steps.buildargs.outputs.build_date }}
          # Provenance + SBOM attached to the registry image. (SBOM is
          # cheap; the cockpit may surface it later in the deployment
          # detail view.)
          provenance: mode=max
          sbom: true
          # Aggressive layer caching — first run is full build, every
          # subsequent run is a Swift-source-diff away from instant.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Cosign keyless: signs the published manifest using the workflow
      # run's OIDC identity. No secrets to manage; verification is
      # against the GitHub OIDC issuer + this repo's identity claim.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Sign the published manifest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          # Sign each :tag → digest pair we published. cosign --yes
          # skips the interactive confirmation that breaks CI.
          for tag in $TAGS; do
            echo "→ Signing $tag (@$DIGEST)"
            cosign sign --yes "${tag}@${DIGEST}"
          done

      # SLSA-3 provenance: "this image was built by this workflow run
      # from this commit at this time, using this Dockerfile, with
      # these build args." Verifiable with the slsa-verifier tool or
      # cosign verify-attestation.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Summary
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          {
            echo "## ✓ Image published"
            echo ""
            echo "**Digest:** \`$DIGEST\`"
            echo ""
            echo "**Tags:**"
            for tag in $TAGS; do
              echo "- \`$tag\`"
            done
            echo ""
            echo "**Pull:**"
            echo "\`\`\`"
            echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@$DIGEST"
            echo "\`\`\`"
            echo ""
            echo "**Verify signature:**"
            echo "\`\`\`"
            echo "cosign verify ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@$DIGEST \\"
            echo "  --certificate-identity-regexp 'https://github.com/${{ github.repository }}' \\"
            echo "  --certificate-oidc-issuer 'https://token.actions.githubusercontent.com'"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
